html,body,#root{margin:0;padding:0;min-height:100%}
html.lenis,html.lenis body{height:auto}
.lenis.lenis-smooth{scroll-behavior:auto!important}
/* Self-contained utility CSS (replaces Tailwind CDN) */
*,*::before,*::after{box-sizing:border-box;border-width:0;border-style:solid}
button{background:none;border:none;cursor:pointer;font:inherit;color:inherit;padding:0}
input,select{font:inherit}
table{border-collapse:collapse}
img,svg{display:inline-block;vertical-align:middle}
@keyframes tw-pulse{0%,100%{opacity:1}50%{opacity:.5}}
.-translate-x-1\/2{transform:translateX(-50%)}
.absolute{position:absolute}
.animate-pulse{animation:tw-pulse 2s cubic-bezier(.4,0,.6,1) infinite}
.block{display:block}
.bottom-5{bottom:1.25rem}
.col-span-2{grid-column:span 2/span 2}
.cursor-not-allowed{cursor:not-allowed}
.cursor-pointer{cursor:pointer}
.fixed{position:fixed}
.flex{display:flex}
.flex-1{flex:1 1 0%}
.flex-col{flex-direction:column}
.flex-wrap{flex-wrap:wrap}
.font-bold{font-weight:700}
.font-extrabold{font-weight:800}
.gap-1{gap:0.25rem}
.gap-1\.5{gap:0.375rem}
.gap-10{gap:2.5rem}
.gap-2{gap:0.5rem}
.gap-3{gap:0.75rem}
.gap-4{gap:1rem}
.gap-6{gap:1.5rem}
.grid{display:grid}
.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid-cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.h-0\.5{height:0.125rem}
.h-1{height:0.25rem}
.h-11{height:2.75rem}
.h-2{height:0.5rem}
.h-5{height:1.25rem}
.h-7{height:1.75rem}
.h-9{height:2.25rem}
.h-full{height:100%}
.h-px{height:1px}
.hidden{display:none}
.inline-block{display:inline-block}
.inline-flex{display:inline-flex}
.inset-0{inset:0}
.items-center{align-items:center}
.items-end{align-items:flex-end}
.justify-between{justify-content:space-between}
.justify-center{justify-content:center}
.justify-end{justify-content:flex-end}
.leading-none{line-height:1}
.leading-relaxed{line-height:1.625}
.leading-tight{line-height:1.25}
.left-1\/2{left:50%}
.max-w-2xl{max-width:42rem}
.max-w-3xl{max-width:48rem}
.max-w-6xl{max-width:72rem}
.max-w-7xl{max-width:80rem}

      .pick-row{color:var(--text);background:transparent;transition:background .15s}
      .pick-row:hover{background:var(--s2)}
      /* ============================ WORLD CUP ATMOSPHERE (decorative, behind content) ============================ */
      #wc-atmos{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;contain:strict;
        background:
          radial-gradient(120% 80% at 50% -12%, #0c2a3b 0%, transparent 55%),
          radial-gradient(80% 60% at 8% 6%, rgba(212,175,55,.06), transparent 52%),
          radial-gradient(80% 60% at 92% 6%, rgba(212,175,55,.06), transparent 52%),
          linear-gradient(180deg, #061018 0%, #07140d 46%, #040b07 100%);}
      #root{position:relative;z-index:1}
      .night-bg{background:transparent !important}
      .wc-par{position:absolute;inset:-24px;will-change:transform;transition:transform .25s ease-out}
      .wc-l{position:absolute;inset:0}
      /* central readability vignette + top ambient */
      .wc-vig{position:absolute;inset:0;background:radial-gradient(56% 74% at 50% 42%, rgba(2,8,5,.86) 0%, rgba(2,8,5,.58) 38%, rgba(2,8,5,.12) 66%, transparent 78%)}
      .wc-amb{position:absolute;left:0;right:0;top:0;height:48%;background:radial-gradient(60% 100% at 50% 0%, rgba(212,175,55,.10), transparent 70%)}
      /* stadium stands (sides) */
      .wc-stand{position:absolute;top:-10%;height:120%;width:48%;
        background:repeating-linear-gradient(180deg, rgba(255,255,255,.028) 0 2px, transparent 2px 10px),
          radial-gradient(130% 92% at var(--sx) 32%, rgba(30,70,50,.92) 0%, rgba(10,26,18,.78) 46%, transparent 72%);
        -webkit-mask:radial-gradient(125% 100% at var(--sx) 42%, #000 36%, transparent 72%);
                mask:radial-gradient(125% 100% at var(--sx) 42%, #000 36%, transparent 72%)}
      .wc-stand.l{left:-7%;--sx:0%} .wc-stand.r{right:-7%;--sx:100%}
      .wc-crowd{position:absolute;top:-10%;height:120%;width:46%;opacity:.5;
        background-image:radial-gradient(rgba(255,255,255,.22) 1px, transparent 1.5px), radial-gradient(rgba(212,175,55,.20) 1px, transparent 1.5px);
        background-size:9px 9px, 18px 18px;background-position:0 0, 5px 8px;
        -webkit-mask:radial-gradient(125% 100% at var(--sx) 42%, #000 28%, transparent 66%);
                mask:radial-gradient(125% 100% at var(--sx) 42%, #000 28%, transparent 66%);
        animation:wcTwinkle 5.5s ease-in-out infinite}
      .wc-crowd.l{left:-5%;--sx:0%} .wc-crowd.r{right:-5%;--sx:100%;animation-delay:-2.5s}
      @keyframes wcTwinkle{0%,100%{opacity:.4}50%{opacity:.62}}
      /* floodlights */
      .wc-flood{position:absolute;top:-6%;width:42%;height:42%;animation:wcBreath 7s ease-in-out infinite;
        background:radial-gradient(closest-side, rgba(255,244,214,.16), rgba(255,244,214,.045) 45%, transparent 70%)}
      .wc-flood.l{left:-9%} .wc-flood.r{right:-9%;animation-delay:-3.5s}
      @keyframes wcBreath{0%,100%{opacity:.65}50%{opacity:1}}
      /* sky spotlight beams */
      .wc-beam2{position:absolute;top:-26%;width:32vw;height:122%;transform-origin:top center;mix-blend-mode:screen;filter:blur(7px);
        background:linear-gradient(180deg, rgba(255,240,200,.11), rgba(255,240,200,.02) 55%, transparent);
        clip-path:polygon(46% 0,54% 0,100% 100%,0 100%);animation:wcSweep 17s ease-in-out infinite}
      .wc-beam2.a{left:6%;animation-delay:-2s} .wc-beam2.b{right:6%;animation-delay:-9s}
      @keyframes wcSweep{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(9deg)}}
      /* warm light pools + embers (premium, replaces cartoon fire) */
      .wc-glow{position:absolute;bottom:0;width:32%;height:44%;mix-blend-mode:screen;animation:wcBreath 6.5s ease-in-out infinite;
        background:radial-gradient(58% 70% at var(--gx) 100%, rgba(255,176,92,.20), rgba(255,120,40,.07) 38%, transparent 66%)}
      .wc-glow.l{left:-5%;--gx:14%} .wc-glow.r{right:-5%;--gx:86%;animation-delay:-3.2s}
      .wc-ember{position:absolute;bottom:5%;width:3px;height:3px;border-radius:50%;background:rgba(255,196,120,.95);opacity:0;
        box-shadow:0 0 6px 1px rgba(255,160,70,.7);will-change:transform,opacity;animation:wcEmber linear infinite}
      @keyframes wcEmber{0%{transform:translate3d(0,0,0) scale(1);opacity:0}12%{opacity:.95}100%{transform:translate3d(var(--dx,8px),-46vh,0) scale(.3);opacity:0}}
      /* smoke */
      .wc-smoke{position:absolute;bottom:0;width:52%;height:32%;filter:blur(26px);opacity:.16;animation:wcDrift 24s ease-in-out infinite;
        background:radial-gradient(closest-side, rgba(180,200,190,.5), transparent 70%)}
      .wc-smoke.l{left:-7%} .wc-smoke.r{right:-7%;animation-delay:-12s}
      @keyframes wcDrift{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(22px,-16px,0)}}
      /* pitch */
      .wc-pitch{position:absolute;left:0;right:0;bottom:0;height:19%;overflow:hidden;
        background:linear-gradient(180deg, transparent, rgba(8,42,23,.5) 42%, rgba(6,28,16,.85))}
      .wc-pitch::before{content:"";position:absolute;left:-25%;right:-25%;bottom:-46%;height:170%;opacity:.45;
        background:repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 2px, transparent 2px 86px);
        transform:perspective(320px) rotateX(62deg);transform-origin:bottom}
      /* large tilted World Cup trophy (right edge) — static with shine + glow, kept clear of content */
      .wc-trophy{position:absolute;right:-7%;bottom:2%;left:auto;transform:rotate(-12deg);transform-origin:bottom center;z-index:0;pointer-events:none;opacity:.92}
      .wc-trophy img{height:62vh;max-height:640px;width:auto;display:block;
        filter:drop-shadow(0 0 34px rgba(255,205,92,.5)) drop-shadow(0 0 90px rgba(255,180,40,.28)) brightness(1.06) contrast(1.04)}
      /* warm halo behind the trophy */
      .wc-trophy::before{content:"";position:absolute;left:50%;top:46%;width:74%;height:74%;
        transform:translate(-50%,-50%);border-radius:50%;z-index:-1;
        background:radial-gradient(circle, rgba(255,210,110,.3) 0%, rgba(255,180,40,.12) 42%, transparent 70%);
        filter:blur(8px)}
      @media (max-width:1024px){.wc-trophy{display:none}}
      /* dynamic bits */
      .wc-confetti{position:absolute;top:-6%;width:7px;height:11px;border-radius:1px;opacity:.0;will-change:transform,opacity;animation:wcFall linear infinite}
      @keyframes wcFall{0%{transform:translate3d(0,-10px,0) rotate(0);opacity:0}8%{opacity:.9}92%{opacity:.9}100%{transform:translate3d(var(--dx,20px),110vh,0) rotate(680deg);opacity:0}}
      .wc-dust{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(255,240,200,.7);opacity:0;will-change:transform,opacity;animation:wcFloat linear infinite}
      @keyframes wcFloat{0%{transform:translate3d(0,0,0);opacity:0}20%{opacity:.55}80%{opacity:.55}100%{transform:translate3d(var(--dx,10px),-120px,0);opacity:0}}
      .wc-fw{position:absolute;width:5px;height:5px;border-radius:50%;opacity:0}
      .wc-fw.boom{animation:wcBoom 1.4s ease-out forwards}
      @keyframes wcBoom{0%{opacity:1;transform:scale(.2);box-shadow:0 0 0 0 currentColor}60%{opacity:.9}100%{opacity:0;transform:scale(1);
        box-shadow:0 -52px 0 -1px currentColor,0 52px 0 -1px currentColor,52px 0 0 -1px currentColor,-52px 0 0 -1px currentColor,37px 37px 0 -1px currentColor,-37px 37px 0 -1px currentColor,37px -37px 0 -1px currentColor,-37px -37px 0 -1px currentColor}}
      @media (prefers-reduced-motion: reduce){#wc-atmos *{animation:none !important}}
</style>

function fmtRemain(ms) {
  const s = Math.floor(ms / 1000);
  const dd = Math.floor(s / 86400), hh = Math.floor(s / 3600) % 24, mm = Math.floor(s / 60) % 60, ss = s % 60;
  const p = (n) => String(n).padStart(2, "0");
  return (dd > 0 ? p(dd) + ":" : "") + p(hh) + ":" + p(mm) + ":" + p(ss);
}

/* Cinematic scroll reveal — GSAP ScrollTrigger when available, CSS fallback otherwise */
function Cine({ children, className = "", y = 110, scale = 0.9, rx = 8 }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    if (window.gsap && window.ScrollTrigger) {
      const tween = window.gsap.fromTo(el,
        { opacity: 0, y, scale, rotateX: rx, transformPerspective: 900 },
        { opacity: 1, y: 0, scale: 1, rotateX: 0, duration: 1.15, ease: "power3.out",
          scrollTrigger: { trigger: el, start: "top 90%", toggleActions: "play none none none" } });
      return () => { if (tween.scrollTrigger) tween.scrollTrigger.kill(); tween.kill(); };
    }
    el.classList.add("reveal");
    const ob = new IntersectionObserver(([e]) => { if (e.isIntersecting) { el.classList.add("on"); ob.disconnect(); } }, { threshold: 0.1 });
    ob.observe(el); return () => ob.disconnect();
  }, []);
  return <div ref={ref} className={className} style={{ willChange: "transform, opacity" }}>{children}</div>;
}
const Reveal = Cine;

/* who does this prediction say will win? */
function predWinner(pred, m) {
  if (!pred || pred.a === undefined || pred.b === undefined) return null;
  if (+pred.a === +pred.b) return "draw";
  return +pred.a > +pred.b ? m.a : m.b;
}
function matchPoints(pred, m) {
  if (!pred || pred.a === undefined || pred.b === undefined) return null;
  if (m.ra === undefined || m.ra === null || m.rb === undefined || m.rb === null) return null;
  const knockout = m.stage && m.stage !== "group";
  if (!knockout) {
    // group stage — unchanged: exact 5, correct outcome (incl. draw) 2.5 from the cutoff
    if (+pred.a === +m.ra && +pred.b === +m.rb) return 5;
    if (kickoffMs(m) >= SCORING_V2_FROM) {
      const predOutcome = +pred.a === +pred.b ? "draw" : (+pred.a > +pred.b ? "a" : "b");
      const realOutcome = +m.ra === +m.rb ? "draw" : (+m.ra > +m.rb ? "a" : "b");
      if (predOutcome === realOutcome) return 2.5;
    }
    return 0;
  }
  // knockout rounds — there is always a qualifier (decided in play or on penalties)
  const predDraw = +pred.a === +pred.b;
  const actualDraw = +m.ra === +m.rb; // a level result means it went to penalties
  const actualQual = actualDraw ? (m.adv || null) : (+m.ra > +m.rb ? "a" : "b"); // who advanced: "a" | "b"
  if (predDraw) {
    if (!actualDraw) return 0; // predicted a draw but the match had a decisive result
    let pts = (+pred.a === +m.ra && +pred.b === +m.rb) ? 5 : 2.5; // exact level score 5, otherwise correct "draw" 2.5
    if (pred.pw && actualQual && pred.pw === actualQual) pts += 5; // +5 bonus for the correct penalty-shootout winner
    return pts;
  }
  // decisive prediction
  if (+pred.a === +m.ra && +pred.b === +m.rb) return 5; // exact score (only possible when the match was decisive)
  const predQual = +pred.a > +pred.b ? "a" : "b";
  if (actualQual && predQual === actualQual) return 2.5; // correct qualifier (even if it went to penalties)
  return 0;
}
function userPoints(preds, matches, finalRes) {
  let pts = 0, count = 0;
  matches.forEach((m) => {
    const p = preds.scores && preds.scores[m.id];
    if (preds.locked && preds.locked[m.id]) count++;
    const mp = matchPoints(p, m);
    if (mp !== null) pts += mp;
  });
  if (finalRes && finalRes.champion && preds.championLocked && preds.champion === finalRes.champion) pts += 25;
  if (finalRes && finalRes.runnerUp && preds.runnerUpLocked && preds.runnerUp === finalRes.runnerUp) pts += 15;
  return { pts, count };
}

        <div className="overflow-y-auto px-5 py-4" style={{ overscrollBehavior: "contain" }}>
          {allMatchDays.map(({ date, list }) => (
            <div key={date} className="mb-5">
              <div className="flex items-center gap-3 mb-2">
                <span className="w-2 h-2 rounded-full" style={{ background: C.gold }} />
                <span className="display font-extrabold" style={{ color: C.gold2 }}>{dayLabel(date)}</span>
                <span className="text-xs" style={{ color: C.dimmer }}>{fmtDate(date)}</span>
                <div className="flex-1 h-px" style={{ background: "var(--l1)" }} />
              </div>
              <div className="space-y-1.5">
                {list.map((m) => {
                  const ko = kickoffMs(m);
                  const done = m.ra != null && m.rb != null;
                  return (
                    <div key={m.id} className="flex items-center gap-2 rounded-xl px-3 py-2 text-sm" style={{ background: "var(--s1)" }}>
                      <span className="num text-xs font-bold px-2 py-0.5 rounded-full shrink-0" style={{ background: "rgba(232,185,49,.14)", color: C.gold2 }}>{localTimeStr(ko, lang)}</span>
                      <span className="flex-1 font-bold flex items-center gap-1.5 justify-end">{teamName(m.a, lang)} <Flag n={m.a} h={15} /></span>
                      <span className="num font-extrabold px-1" dir="ltr" style={{ color: done ? C.gold2 : C.dimmer }}>{done ? scoreTxt(m.ra, m.rb) : "×"}</span>
                      <span className="flex-1 font-bold flex items-center gap-1.5"><Flag n={m.b} h={15} /> {teamName(m.b, lang)}</span>
                      <span className="hidden sm:block text-xs shrink-0" style={{ color: C.dimmer, maxWidth: 150, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>🏟️ {m.stadium} · {m.city}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  /* =========================== LANDING — cinematic campaign =========================== */
  const CinematicPodium = ({ list }) => {
    const tp = list.slice(0, 3);
    if (tp.length === 0) return null;
    const order = [1, 0, 2]; // 2nd · 1st · 3rd
    const medal = ["🥇", "🥈", "🥉"];
    const col = ["var(--gold)", "#C7CDD4", "#C08A52"];
    const glow = ["0 0 38px rgba(242,193,78,.6), 0 0 90px rgba(242,193,78,.26)", "0 0 22px rgba(199,205,212,.4)", "0 0 22px rgba(192,138,82,.4)"];
    const initials = (n) => n.split(" ").map((w) => w[0]).slice(0, 2).join("");
    return (
      <div className="cine-stage relative flex items-end justify-center gap-2 sm:gap-5 pt-12">
        <div className="cine-spotlight" />
        {order.map((pos, idx) => {
          const u = tp[pos];
          if (!u) return <div key={pos} style={{ width: 116 }} />;
          const first = pos === 0;
          const ring = first ? 72 : 58, inner = first ? 64 : 50, baseH = first ? 156 : pos === 1 ? 116 : 90;
          return (
            <div key={u.email} className="cine-pillar text-center relative" style={{ width: first ? 138 : 116, zIndex: first ? 2 : 1 }}>
              {first && <span className="cine-crown">👑</span>}
              <div className={"cine-avatar mx-auto mb-2" + (first ? " cine-halo" : "")} style={{ width: ring, height: ring, background: `conic-gradient(${col[pos]} 360deg, transparent 0)`, boxShadow: glow[pos] }}>
                <span className="rounded-full flex items-center justify-center font-extrabold" style={{ width: inner, height: inner, background: "var(--pageB)", color: "var(--text)", fontSize: first ? 19 : 15 }}>
                  {initials(u.name)}
                </span>
              </div>
              <div className="text-2xl leading-none mb-1">{medal[pos]}</div>
              <div className="font-extrabold text-sm truncate px-1" style={{ color: "var(--text)" }}>{u.name.split(" ").slice(0, 2).join(" ")}</div>
              <div className="text-xs num font-bold mb-2" style={{ color: "var(--goldText)" }}>★ {u.pts} {t.pts}</div>
              <div className="cine-base sheen" style={{ height: baseH, background: first ? "linear-gradient(180deg, rgba(242,193,78,.3), rgba(242,193,78,.05))" : "var(--s1)", border: `1px solid ${first ? "rgba(242,193,78,.5)" : "var(--l1)"}` }}>
                <span className="display font-extrabold" style={{ fontSize: first ? 40 : 30, color: col[pos] }}>{pos + 1}</span>
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  if (stage !== "app") {
    const ptsChips = [["5", t.ptExact], ["2.5", t.ptOutcome], ["25", t.ptChamp], ["15", t.ptRunner]];
    const pulseList = sortedMatches.filter((m) => !m.hidden && kickoffMs(m) > now).slice(0, 8);
    return (
      <div dir={dir} data-theme={theme} data-palette={look.palette || "emerald"} className="min-h-screen hero-bg relative overflow-hidden" style={{ fontFamily: BODY_FONT, color: "var(--text)" }}>
        <GlobalStyle />
        <div className="grain" />
        <Auroras /><Beams /><Particles />
        {AdminModal()}{ScheduleModal()}{ShareModal()}{Toast()}
        <ConfettiLayer burst={burst} />

        {/* nav */}
        <div className="relative z-10 flex items-center justify-between px-5 lg:px-12 pt-5 fade-up">
          <Logo height={42} />
          <div className="flex items-center gap-2">
            <button onClick={() => setScheduleOpen(true)} className="btn-pop sheen text-xs font-bold px-4 py-2 rounded-full"
              style={{ background: "var(--s1)", color: "var(--goldText)", border: "1px solid var(--l1)" }}>
              🗓️ <span className="hidden sm:inline">{t.schedule}</span>
            </button>
            {ThemeToggle()}{LangToggle()}
            <button onClick={() => setAdminModal(true)} className="btn-pop text-xs font-bold px-3 py-2 rounded-full"
              style={{ background: "transparent", color: "var(--dimmer)", border: "1px solid var(--l1)" }}>
              {t.adminLink}
            </button>
          </div>
        </div>

        {/* ACT 1 — HERO: headline + the join card front and center */}
        <div className="relative z-10 max-w-7xl mx-auto px-5 lg:px-12 pt-8 lg:pt-12 grid lg:grid-cols-2 gap-10 items-center">
          <FloatingFlags />
          <div className="relative">
            {!isHidden("eyebrowHero") && (
            <div className="fade-up-1 inline-flex items-center gap-2 glass edge rounded-full px-4 py-1.5 text-xs font-bold uppercase mb-5" style={{ color: "var(--mint)", letterSpacing: ".15em", ...styleFor("eyebrowHero") }}>
              <span className="w-2 h-2 rounded-full tick-anim" style={{ background: "var(--red)" }} />
              {t.eyebrowHero}
            </div>)}
            <h1 className="display font-extrabold mb-5" style={{ fontSize: "clamp(40px,5.6vw,72px)", lineHeight: 1.18, color: "var(--text)" }}>
              {!isHidden("heroA") && <div style={styleFor("heroA")}><span className="word" style={{ animationDelay: ".15s" }}>{t.heroA}</span></div>}
              {!isHidden("heroB") && <div style={styleFor("heroB")}>
                <em className="shimmer-text word" style={{ animationDelay: ".4s", display: "inline-block", lineHeight: 1.42, paddingBottom: ".2em" }}>{t.heroB}</em>
              </div>}
            </h1>
            {!isHidden("heroSub") && <p className="fade-up-3 text-base lg:text-lg max-w-md leading-relaxed mb-6" style={{ color: "var(--dim)", ...styleFor("heroSub") }}>{t.heroSub}</p>}
            <div className="fade-up-3 flex flex-wrap gap-2 mb-7">
              {[["🏆", t.prize1, "prize1"], ["🎯", t.prize2, "prize2"], ["⏳", t.prize3, "prize3"]].map(([ic, txt, k]) => (
                !isHidden(k) && <span key={k} className="glass edge rounded-full px-4 py-2 text-xs font-bold inline-flex items-center gap-2" style={{ color: "var(--text)", ...styleFor(k) }}>{ic} {txt}</span>
              ))}
            </div>
            <div className="fade-up-4">
              <div className="text-xs uppercase font-bold mb-2" style={{ color: "var(--mint)", letterSpacing: ".18em" }}>{t.kickoff}</div>
              <Countdown target={kickoffTarget} t={t} />
              <div className="flex flex-wrap gap-3 mt-6">
                <a href="#join" className="btn-pop sheen px-7 py-3.5 rounded-2xl text-sm font-extrabold inline-flex items-center gap-2"
                  style={{ background: "linear-gradient(120deg, var(--gold2), var(--goldDeep))", color: "#1c1503", boxShadow: "0 14px 36px -12px rgba(242,193,78,.65)", textDecoration: "none" }}>
                  ⚽ {t.joinNow}
                </a>
                <button onClick={() => setScheduleOpen(true)} className="btn-pop px-7 py-3.5 rounded-2xl text-sm font-extrabold"
                  style={{ background: "var(--s1)", color: "var(--text)", border: "1px solid var(--l2)" }}>
                  {t.schedule}
                </button>
              </div>
            </div>
          </div>
          {/* trophy crowning the join card */}
          <div id="join" className="relative flex flex-col items-center fade-up-2">
            <div className="relative inline-block trophy-float mb-3">
              <div className="halo" />
              <div className="trophy-glow"><Trophy size={185} id="hero" /></div>
            </div>
          <div className="glass-strong edge rounded-3xl p-8 w-full max-w-md fade-up">
              <div className="flex rounded-xl p-1 mb-6" style={{ background: "var(--s1)" }}>
                {[["signin", t.signin], ["signup", t.signup]].map(([k, label]) => (
                  <button key={k} onClick={() => { setAuthMode(k); setError(""); }}
                    className="btn-pop flex-1 py-2 rounded-lg text-sm font-bold"
                    style={authMode === k ? { background: "linear-gradient(120deg, var(--gold2), var(--goldDeep))", color: "#1c1503" } : { color: "var(--dim)" }}>
                    {label}
                  </button>
                ))}
              </div>
              <h2 className="text-xl font-bold mb-1" style={{ color: "var(--text)" }}>{authMode === "reset" ? t.resetTitle : authMode === "signin" ? t.welcomeBack : t.join}</h2>
              <p className="text-sm mb-5" style={{ color: "var(--dim)" }}>{authMode === "reset" ? t.resetHint : t.exclusive}</p>
              <label className="text-xs font-bold uppercase" style={{ color: "var(--dim)", letterSpacing: ".1em" }}>{t.email}</label>
              <input value={email} onChange={(e) => setEmail(e.target.value)} dir="ltr" placeholder={`name@${DOMAIN}`}
                className="w-full mt-1 mb-3 px-4 py-3 rounded-xl text-sm" style={{ ...inputDark, textAlign: dir === "rtl" ? "right" : "left" }} />
              <label className="text-xs font-bold uppercase" style={{ color: "var(--dim)", letterSpacing: ".1em" }}>{t.password}</label>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} dir="ltr"
                onKeyDown={(e) => e.key === "Enter" && (authMode === "signin" ? signIn() : authMode === "reset" ? resetPassword() : register())}
                placeholder={authMode === "reset" ? t.newPass : authMode === "signup" ? t.passHint : t.yourPass}
                className="w-full mt-1 mb-3 px-4 py-3 rounded-xl text-sm" style={{ ...inputDark, textAlign: dir === "rtl" ? "right" : "left" }} />
              {authMode === "signin" && (
                <div className="flex justify-end -mt-1 mb-3">
                  <button onClick={() => { setAuthMode("reset"); setError(""); setPassword(""); }} className="btn-pop text-xs font-bold" style={{ color: "var(--goldText)" }}>{t.forgot}</button>
                </div>
              )}
              {authMode === "reset" && (
                <div className="flex justify-end -mt-1 mb-3">
                  <button onClick={() => { setAuthMode("signin"); setError(""); setPassword(""); }} className="btn-pop text-xs font-bold" style={{ color: "var(--dim)" }}>{t.backSignin}</button>
                </div>
              )}
              {authMode === "signup" && (
                <React.Fragment>
                  <label className="text-xs font-bold uppercase" style={{ color: "var(--dim)", letterSpacing: ".1em" }}>{t.dept}</label>
                  <select value={deptPick} onChange={(e) => setDeptPick(e.target.value)}
                    className="w-full mt-1 mb-3 px-4 py-3 rounded-xl text-sm" style={inputDark}>
                    <option value="" style={{ color: "#111" }}>{t.selDept}</option>
                    {DEPARTMENTS.map((d) => <option key={d} value={d} style={{ color: "#111" }}>{deptName(d, lang)}</option>)}
                    <option value="__other__" style={{ color: "#111" }}>{t.deptOther}</option>
                  </select>
                  {deptPick === "__other__" && (
                    <input value={deptOther} onChange={(e) => setDeptOther(e.target.value)} placeholder={t.deptOtherPh}
                      className="w-full -mt-1 mb-3 px-4 py-3 rounded-xl text-sm" style={{ ...inputDark, textAlign: dir === "rtl" ? "right" : "left" }} />
                  )}
                </React.Fragment>
              )}
              {authMode === "signup" && email.trim().toLowerCase().endsWith("@" + DOMAIN) && (
                <div className="text-xs rounded-xl px-4 py-2.5 mb-3 flex items-center gap-2"
                  style={{ background: "rgba(242,193,78,.12)", color: "var(--goldText)", border: "1px solid rgba(242,193,78,.35)" }}>
                  <span className="w-5 h-5 rounded-full flex items-center justify-center text-xs shrink-0" style={{ background: "var(--gold)", color: "#1c1503" }}>✓</span>
                  {t.detected} <b style={{ color: "var(--text)" }}>{nameFromEmail(email.trim().toLowerCase())}</b>
                </div>
              )}
              {error && <div className="text-sm rounded-xl px-4 py-3 mb-3" style={{ background: "rgba(229,72,77,.16)", color: "#FFB4B7", border: "1px solid rgba(229,72,77,.4)" }}>{error}</div>}
              <button onClick={authMode === "signin" ? signIn : authMode === "reset" ? resetPassword : register} disabled={busy}
                className="btn-pop sheen w-full py-3.5 rounded-2xl text-sm font-extrabold"
                style={{ background: "linear-gradient(120deg, var(--gold2), var(--goldDeep))", color: "#1c1503", boxShadow: "0 14px 36px -12px rgba(242,193,78,.55)" }}>
                {busy ? t.checking : authMode === "signin" ? t.signin : authMode === "reset" ? t.resetBtn : t.createEnter}
              </button>
              <div className="mt-5 text-xs rounded-xl px-4 py-3 leading-relaxed" style={{ background: "rgba(23,178,106,.10)", color: "var(--mint)", border: "1px solid rgba(23,178,106,.3)" }}>
                <b>{t.how}</b> — {t.howTxt}
              </div>
          </div>
          </div>
        </div>

        {/* ACT 2 — TOURNAMENT PULSE */}
        {pulseList.length > 0 && (
          <div className="relative z-10 max-w-7xl mx-auto px-5 lg:px-12 mt-14">
            <div className="flex items-center gap-3 mb-4 fade-up">
              <span className="w-2 h-2 rounded-full" style={{ background: "var(--gold)" }} />
              <span className="display text-lg font-extrabold" style={{ color: "var(--goldText)" }}>⚡ {t.pulse}</span>
              <div className="flex-1 h-px" style={{ background: "var(--l1)" }} />
            </div>
            <div className="flex gap-3 overflow-x-auto pb-3" style={{ scrollbarWidth: "thin" }}>
              {pulseList.map((m) => (
                <div key={m.id} className="glass edge card-x rounded-2xl px-4 py-3 shrink-0" style={{ minWidth: 215 }}>
                  <div className="flex items-center justify-between gap-3 mb-2">
                    <span className="flex items-center gap-1.5 font-bold text-sm" style={{ color: "var(--text)" }}><Flag n={m.a} h={16} /> {teamName(m.a, lang)}</span>
                  </div>
                  <div className="flex items-center justify-between gap-3 mb-2">
                    <span className="flex items-center gap-1.5 font-bold text-sm" style={{ color: "var(--text)" }}><Flag n={m.b} h={16} /> {teamName(m.b, lang)}</span>
                  </div>
                  <div className="flex items-center justify-between text-xs font-bold">
                    <span style={{ color: "var(--dimmer)" }}>{fmtDate(localISO(kickoffMs(m)))}</span>
                    <span className="num px-2 py-0.5 rounded-full" dir="ltr" style={{ background: "rgba(242,193,78,.14)", color: "var(--goldText)" }}>{fmtRemain(kickoffMs(m) - now)}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ACT 2.5 — LEADERBOARD (cinematic top 3 + leaders) */}
        {users.length > 0 && (
          <div className="relative z-10 max-w-3xl mx-auto px-5 lg:px-12 mt-16">
            <div className="text-center fade-up">
              <div className="inline-flex items-center gap-2 glass edge rounded-full px-4 py-1.5 text-xs font-bold uppercase mb-3" style={{ color: "var(--goldText)", letterSpacing: ".14em" }}>🏆 {t.boardTitle}</div>
              <p className="text-sm mb-2" style={{ color: "var(--dim)" }}>{t.topSub}</p>
            </div>
            <CinematicPodium list={users} />
            {users.length > 3 && (
              <div className="space-y-2 mt-8">
                {users.slice(3, 10).map((u, i) => (
                  <div key={u.email} className="glass edge card-x rounded-2xl px-4 py-2.5 flex items-center gap-3">
                    <span className="num font-extrabold w-7 text-center" style={{ color: "var(--dimmer)" }}>{i + 4}</span>
                    <span className="rounded-full flex items-center justify-center text-xs font-extrabold shrink-0" style={{ width: 32, height: 32, background: "var(--s2)", color: "var(--text)" }}>{u.name.split(" ").map((w) => w[0]).slice(0, 2).join("")}</span>
                    <span className="flex-1 font-bold text-sm truncate">{u.name}</span>
                    <span className="num font-extrabold px-3 py-1 rounded-full text-sm" style={{ background: "rgba(242,193,78,.14)", color: "var(--goldText)" }}>★ {u.pts}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ACT 3 — HOW IT PLAYS + POINTS */}
        <div className="relative z-10 max-w-7xl mx-auto px-5 lg:px-12 mt-14 grid lg:grid-cols-2 gap-10">
          <div className="fade-up">
            <h2 className="display text-2xl font-extrabold mb-5" style={{ color: "var(--text)" }}>{t.howTitle}</h2>
            <div className="space-y-3">
              {[t.how1, t.how2, t.how3].map((s, i) => (
                <div key={i} className="glass edge card-x rounded-2xl p-4 flex items-center gap-4">
                  <span className="display text-3xl font-extrabold shrink-0" style={{ color: "var(--gold)", opacity: .9 }}>{String(i + 1).padStart(2, "0")}</span>
                  <span className="font-bold text-sm" style={{ color: "var(--text)" }}>{s}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="fade-up-1">
            <h2 className="display text-2xl font-extrabold mb-5" style={{ color: "var(--text)" }}>{t.ptsSystem}</h2>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              {ptsChips.map(([n, label]) => (
                <div key={label} className="glass edge card-x rounded-2xl p-4 text-center">
                  <div className="display num text-4xl font-extrabold shimmer-text">{n}</div>
                  <div className="text-xs font-bold mt-1" style={{ color: "var(--dim)" }}>{t.pts} · {label}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="relative z-10"><FlagMarquee reverse h={26} /></div>
        {!isHidden("flagship") && <div className="relative z-10 py-5 text-center text-xs" style={{ color: "var(--dimmer)", ...styleFor("flagship") }}>{t.flagship}</div>}
      </div>
    );
  }

  /* =========================== MAIN APP — the Arena =========================== */
  const tabs = [["matches", t.tabMatches], ["board", t.tabBoard], ...(isAdmin ? [["admin", t.tabAdmin + " 🔒"]] : [])];
  const visDone = visibleMatches.filter((m) => lockedMatches[m.id]).length;
  const progPct = visibleMatches.length ? Math.round((visDone / visibleMatches.length) * 100) : 0;

  return (
    <div dir={dir} data-theme={theme} data-palette={look.palette || "emerald"} className="min-h-screen night-bg relative" style={{ fontFamily: BODY_FONT, color: "var(--text)" }}>
      <GlobalStyle />
      <div className="grain" />
      {AdminModal()}{ScheduleModal()}{ShareModal()}{Toast()}
      <ConfettiLayer burst={burst} />

      <header className="sticky top-0 z-20" style={{ background: "var(--headerBg)", backdropFilter: "blur(18px)", borderBottom: "1px solid var(--l1)" }}>
        <div className="h-0.5 w-full" style={{ background: "linear-gradient(90deg, var(--green2), var(--gold), var(--red))" }} />
        <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
          <div className="flex items-center gap-3">
            <Logo height={34} />
            <div className="hidden md:block">
              <div className="text-sm font-extrabold leading-none">{t.brand}</div>
              <div className="text-xs" style={{ color: "var(--dim)" }}>{t.platform}</div>
            </div>
          </div>

          {/* personal status bar */}
          {!profile?.admin && (
            <div className="hidden sm:flex items-center gap-3 glass edge rounded-full px-3 py-1.5">
              <div className="avatar-ring w-9 h-9 text-xs" style={{
                background: `conic-gradient(var(--gold) ${progPct * 3.6}deg, var(--ringTrack) 0deg)`,
              }}>
                <span className="w-7 h-7 rounded-full flex items-center justify-center"
                  style={{ background: "var(--pageB)", color: "var(--text)" }}>
                  {profile ? profile.name.split(" ").map((w) => w[0]).slice(0, 2).join("") : "?"}
                </span>
              </div>
              <div className="leading-tight">
                <div className="text-xs font-extrabold">{profile && profile.name.split(" ")[0]}</div>
                <div className="text-xs num" style={{ color: "var(--dim)" }}>{visDone}/{visibleMatches.length} {t.myPreds}</div>
              </div>
              <div className="px-2.5 py-1 rounded-full text-xs font-extrabold num" style={{ background: "rgba(242,193,78,.16)", color: "var(--goldText)" }}>
                ★ {myStats.pts} {t.pts}
              </div>
            </div>
          )}

          <div className="flex items-center gap-2">
            {!isAdmin && profile && !profile.admin && (
              <button onClick={() => setShareOpen(true)} className="btn-pop sheen text-xs font-bold px-3 py-1.5 rounded-full"
                style={{ background: "rgba(23,178,106,.14)", color: "var(--mint)", border: "1px solid rgba(23,178,106,.35)" }}>
                📤 <span className="hidden lg:inline">{t.shareBtn}</span>
              </button>
            )}
            <button onClick={() => setScheduleOpen(true)} className="btn-pop text-xs font-bold px-3 py-1.5 rounded-full"
              style={{ background: "rgba(242,193,78,.14)", color: "var(--goldText)", border: "1px solid rgba(242,193,78,.35)" }}>
              🗓️ <span className="hidden lg:inline">{t.schedule}</span>
            </button>
            {ThemeToggle()}{LangToggle()}
            {!isAdmin && (
              <button onClick={() => setAdminModal(true)} className="btn-pop text-xs font-bold px-3 py-1.5 rounded-full hidden sm:block"
                style={{ background: "transparent", color: "var(--dimmer)", border: "1px solid var(--l1)" }}>
                {t.adminLink}
              </button>
            )}
            <button onClick={profile && profile.admin ? adminLogout : signOut} className="text-xs font-bold" style={{ color: "var(--dim)" }}>{t.signout}</button>
          </div>
        </div>
        <div className="max-w-6xl mx-auto px-4 flex gap-1">
          {tabs.map(([k, label]) => (
            <button key={k} onClick={() => setTab(k)} className="px-4 py-2.5 text-sm font-bold whitespace-nowrap btn-pop"
              style={tab === k ? { color: "var(--goldText)", borderBottom: "3px solid var(--gold)", textShadow: "0 0 14px rgba(242,193,78,.5)" } : { color: "var(--dimmer)", borderBottom: "3px solid transparent" }}>
              {label}
            </button>
          ))}
        </div>
      </header>

      <main key={tab + lang} className="max-w-6xl mx-auto px-4 py-8 fade-up relative z-10">

        {/* ============== MATCHES — the prediction arena ============== */}
        {tab === "matches" && (() => {
          const dayKeys = matchDays.map((d) => d.date);
          const curDay = activeDay && dayKeys.includes(activeDay) ? activeDay : "";
          const shownDays = curDay ? matchDays.filter((d) => d.date === curDay) : matchDays;
          return (
            <div className="max-w-3xl mx-auto">
              {/* champion / runner-up */}
              <Cine y={40} scale={1} rx={0}>
                <div className="flex items-center gap-3 mb-5 mt-2">
                  <div className="flex-1 h-px" style={{ background: "var(--l1)" }} />
                  <div className="display text-lg font-extrabold" style={{ color: "var(--goldText)" }}>🏆 {t.champTitle}</div>
                  <div className="flex-1 h-px" style={{ background: "var(--l1)" }} />
                </div>
                <div className="grid sm:grid-cols-2 gap-6">
                  {[
                    ["champion", t.champ, champion, setChampion, championLocked, lockChampion, t.champPts],
                    ["runnerUp", t.runner, runnerUp, setRunnerUp, runnerUpLocked, lockRunnerUp, t.runnerPts],
                  ].map(([key, label, val, set, isLocked, lockFn, pts]) => (
                    <div key={key} className="relative glass edge card-x rounded-3xl overflow-hidden"
                      style={{ borderColor: isLocked ? "rgba(242,193,78,.55)" : "var(--glassLine)" }}>
                      <div className="relative p-6 text-center">
                        <div className="trophy-float inline-block mb-2"><div className="trophy-glow"><Trophy size={86} id={"pick-" + key} /></div></div>
                        <div className="text-xs font-bold uppercase" style={{ color: "var(--mint)", letterSpacing: ".14em" }}>{label}</div>
                        <div className="text-xs font-bold mb-3" style={{ color: "var(--goldText)" }}>{pts}</div>

                        {isLocked ? (
                          <div className="inline-flex items-center gap-2 text-xl font-extrabold px-4 py-2 rounded-2xl" style={{ background: "var(--s1)", border: "1px solid rgba(242,193,78,.45)" }}>
                            <Flag n={val} h={26} glow /> {teamName(val, lang)} <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{ background: "var(--gold)", color: "#1c1503" }}>🔒</span>
                          </div>
                        ) : (isVoteClosed(now) || isFinalClosed(now)) ? (
                          <div className="text-center text-xs font-bold py-2.5 rounded-2xl" style={{ background: "var(--s1)", color: "var(--dimmer)", border: "1px dashed var(--l1)" }}>🛑 {t.voteStoppedMsg}</div>
                        ) : (
                          <React.Fragment>
                            <button onClick={() => setPickerOpen(pickerOpen === key ? "" : key)}
                              className="btn-pop w-full flex items-center justify-center gap-2 py-3 rounded-2xl text-sm font-extrabold"
                              style={val
                                ? { background: "var(--s1)", color: "var(--text)", border: "1px solid rgba(242,193,78,.5)" }
                                : { background: "var(--s1)", color: "var(--dim)", border: "1px dashed var(--l1)" }}>
                              {val ? <span className="inline-flex items-center gap-2"><Flag n={val} h={22} glow /> {teamName(val, lang)}</span> : <span>🏳️ {t.chooseTeam}</span>}
                              <span style={{ color: "var(--dimmer)", transform: pickerOpen === key ? "rotate(180deg)" : "none", transition: "transform .2s" }}>▾</span>
                            </button>

                            {pickerOpen === key && (
                              <div className="flex flex-col gap-1 mt-3 p-2 rounded-2xl" style={{ background: "var(--s1)", border: "1px solid var(--l1)", maxHeight: 300, overflowY: "auto" }}>
                                {TEAMS.filter((x) => x.n !== "TBD").map((tm) => (
                                  <button key={tm.n} onClick={() => { set(tm.n); setPickerOpen(""); }}
                                    className="pick-row w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold"
                                    style={val === tm.n
                                      ? { background: "var(--gold)", color: "#1c1503", boxShadow: "0 0 16px rgba(242,193,78,.5)" }
                                      : {}}>
                                    <Flag n={tm.n} h={22} />
                                    <span className="flex-1 text-right">{teamName(tm.n, lang)}</span>
                                    {val === tm.n && <span>✓</span>}
                                  </button>
                                ))}
                              </div>
                            )}

                            <button onClick={lockFn} disabled={!val}
                              className="btn-pop sheen w-full py-2.5 mt-3 rounded-2xl text-sm font-extrabold"
                              style={val ? { background: "linear-gradient(120deg, var(--gold2), var(--goldDeep))", color: "#1c1503" } : { background: "var(--s1)", color: "var(--dimmer)" }}>
                              {t.confirm}
                            </button>
                          </React.Fragment>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </Cine>

              {/* Top 10 leaderboard — luminous home spotlight */}
              {users.length > 0 && (() => {
                const top = users.slice(0, 10);
                const medal = ["var(--gold)", "#D7DCE6", "#E0A571"];
                return (
                  <div className="glass-strong edge rounded-3xl p-6 lg:p-7 mb-8 fade-up relative overflow-hidden">
                    <div className="absolute pointer-events-none" style={{ [dir === "rtl" ? "left" : "right"]: -40, top: -30, opacity: .07 }}>
                      <Trophy size={220} glow={false} id="topboard" />
                    </div>
                    <div className="relative">
                      <div className="flex items-center gap-2 mb-5">
                        <span className="text-2xl">🏆</span>
                        <div>
                          <h3 className="display text-xl font-extrabold leading-tight" style={{ color: "var(--text)", textShadow: "0 0 18px rgba(242,193,78,.45)" }}>{t.topTitle}</h3>
                          <div className="text-xs font-bold" style={{ color: "var(--dim)" }}>{t.topSub}</div>
                        </div>
                      </div>
                      <div className="space-y-2">
                        {top.map((u, i) => (
                          <div key={u.email} className="flex items-center gap-3 rounded-2xl px-3 py-2.5"
                            style={i < 3
                              ? { background: "linear-gradient(120deg, rgba(242,193,78,.16), rgba(242,193,78,.04))", border: "1px solid rgba(242,193,78,.32)" }
                              : { background: "var(--s1)", border: "1px solid var(--l1)" }}>
                            <span className="num font-extrabold w-8 h-8 rounded-full flex items-center justify-center text-sm shrink-0"
                              style={i < 3 ? { background: medal[i], color: "#1c1503", boxShadow: "0 0 16px -2px " + medal[i] } : { background: "var(--s2)", color: "var(--dim)" }}>
                              {i + 1}
                            </span>
                            <div className="flex-1 min-w-0">
                              <div className="font-extrabold truncate" style={{ color: "var(--text)" }}>{u.name}</div>
                              <div className="text-xs truncate" style={{ color: "var(--dimmer)" }}>{deptName(u.dept, lang)}</div>
                            </div>
                            <span className="num font-extrabold px-3 py-1 rounded-full text-sm shrink-0" style={{ background: "rgba(242,193,78,.14)", color: "var(--goldText)" }}>★ {u.pts}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* collapsible — your previous predictions (read-only) */}
              {(() => {
                const myPast = sortedMatches.filter((m) => lockedMatches[m.id] && m.ra != null && m.rb != null);
                return (
                  <div className="glass edge rounded-3xl mb-8 overflow-hidden">
                    <button onClick={() => setMyPastOpen((v) => !v)} className="btn-pop w-full flex items-center gap-3 px-5 py-4">
                      <span className="text-xl">📋</span>
                      <span className="flex-1">
                        <span className="block font-extrabold" style={{ color: "var(--text)", textAlign: dir === "rtl" ? "right" : "left" }}>{t.pastPreds}</span>
                        <span className="block text-xs" style={{ color: "var(--dim)", textAlign: dir === "rtl" ? "right" : "left" }}>{t.pastPredsSub}</span>
                      </span>
                      {myPast.length > 0 && <span className="num text-xs font-bold px-2.5 py-1 rounded-full" style={{ background: "rgba(242,193,78,.14)", color: "var(--goldText)" }}>{myPast.length}</span>}
                      <span style={{ color: "var(--dimmer)" }}>{myPastOpen ? "▲" : "▼"}</span>
                    </button>
                    {myPastOpen && (
                      <div className="px-4 pb-4" style={{ borderTop: "1px solid var(--l1)" }}>
                        {myPast.length === 0 ? (
                          <div className="py-6 text-center text-sm" style={{ color: "var(--dim)" }}>{t.pastPredsEmpty}</div>
                        ) : (
                          <div className="space-y-2 mt-3">
                            {myPast.map((m) => {
                              const pick = scores[m.id] || {};
                              const mp = matchPoints(pick, m);
                              return (
                                <div key={m.id} className="rounded-2xl px-3 py-2.5" style={{ background: "var(--s1)", border: "1px solid var(--l1)" }}>
                                  <div className="flex flex-wrap items-center gap-2 text-sm">
                                    <span className="font-bold flex items-center gap-1.5"><Flag n={m.a} h={14} /> {teamName(m.a, lang)}</span>
                                    <span className="num font-extrabold px-2" dir="ltr" style={{ color: "var(--goldText)" }}>{scoreTxt(m.ra, m.rb)}</span>
                                    <span className="font-bold flex items-center gap-1.5">{teamName(m.b, lang)} <Flag n={m.b} h={14} /></span>
                                    <span className="flex-1" />
                                    {mp !== null && <span className="text-xs font-bold px-2.5 py-1 rounded-full" style={{ background: mp === 5 ? "var(--gold)" : mp > 0 ? "rgba(23,178,106,.2)" : "var(--s2)", color: mp === 5 ? "#1c1503" : mp > 0 ? "var(--mint)" : "var(--dim)" }}>+{mp} · {mp === 5 ? t.exact : mp > 0 ? t.outcome : t.miss}</span>}
                                  </div>
                                  <div className="text-xs mt-1" style={{ color: "var(--dimmer)" }}>{t.yourPick}: <span className="num" dir="ltr">{scoreTxt(pick.a, pick.b)}</span></div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* featured next match spotlight */}
              {nextMatch && (
                <div className="relative glass edge rounded-3xl overflow-hidden mb-8 fade-up">
                  <div className="absolute pointer-events-none" style={{ [dir === "rtl" ? "left" : "right"]: -50, top: -30, opacity: .08 }}>
                    <Trophy size={300} glow={false} id="feat" />
                  </div>
                  <div className="relative p-6 lg:p-8">
                    <div className="flex items-center gap-2 mb-5">
                      <span className="w-2 h-2 rounded-full tick-anim" style={{ background: "var(--red)" }} />
                      <span className="text-xs font-extrabold uppercase" style={{ color: "var(--goldText)", letterSpacing: ".16em" }}>{t.featured}</span>
                      <span className="text-xs font-bold px-2.5 py-1 rounded-full" style={{ background: "rgba(23,178,106,.15)", color: "var(--mint)" }}>
                        {stageName(nextMatch.stage || "group", lang)}{nextMatch.group && nextMatch.group !== "—" ? ` · ${t.group} ${nextMatch.group}` : ""}
                      </span>
                      <span className="flex-1" />
                      <span className="hidden sm:block text-xs font-bold" style={{ color: "var(--dim)" }}>🏟️ {nextMatch.stadium} · {nextMatch.city}</span>
                    </div>
                    <div className="flex items-center justify-between gap-4">
                      <div className="flex-1 text-center">
                        <Flag n={nextMatch.a} h={56} glow />
                        <div className="font-extrabold text-lg mt-2">{teamName(nextMatch.a, lang)}</div>
                      </div>
                      <RingCountdown target={kickoffMs(nextMatch)} now={now} t={t} />
                      <div className="flex-1 text-center">
                        <Flag n={nextMatch.b} h={56} glow />
                        <div className="font-extrabold text-lg mt-2">{teamName(nextMatch.b, lang)}</div>
                      </div>
                    </div>
                    <div className="text-center text-xs font-bold mt-4" style={{ color: "var(--dim)" }}>
                      📅 {fmtDate(localISO(kickoffMs(nextMatch)))} · 🕐 {localTimeStr(kickoffMs(nextMatch), lang)} ({t.localTime})
                    </div>
                  </div>
                </div>
              )}

              {/* day navigator */}
              <div className="sticky z-10 flex gap-2 overflow-x-auto pb-3 mb-6" style={{ top: 110, scrollbarWidth: "none" }}>
                <button className={`day-pill ${!curDay ? "on" : ""}`} onClick={() => setActiveDay("")}>{t.allDays}</button>
                {matchDays.map(({ date, list }) => (
                  <button key={date} className={`day-pill ${curDay === date ? "on" : ""}`} onClick={() => setActiveDay(date)}>
                    {dayLabel(date)} <span className="num" style={{ opacity: .75 }}>· {list.length}</span>
                  </button>
                ))}
              </div>

              {shownDays.map(({ date, list }) => (
                <Cine key={date} className="mb-10" y={40} scale={1} rx={0}>
                  <div className="flex items-center gap-3 mb-5">
                    <div className="flex-1 h-px" style={{ background: "var(--l1)" }} />
                    <div className="text-center">
                      <div className="display text-lg font-extrabold" style={{ color: "var(--goldText)" }}>{dayLabel(date)}</div>
                      <div className="text-xs" style={{ color: "var(--dimmer)" }}>{fmtDate(date)}</div>
                    </div>
                    <div className="flex-1 h-px" style={{ background: "var(--l1)" }} />
                  </div>

                  <div className="space-y-6">
                    {list.map((m) => {
                      const hasPick = !!lockedMatches[m.id];
                      const s = scores[m.id] || {};
                      const ko = kickoffMs(m);
                      const hasResult = m.ra !== undefined && m.ra !== null && m.rb !== undefined && m.rb !== null;
                      const remain = ko - now;
                      const gateClosed = isVoteClosed(now);
                      const isKnockout = m.stage && m.stage !== "group";
                      const editable = remain > 0 && !hasResult && !gateClosed;          // can edit freely until kickoff
                      const frozen = (remain <= 0 || gateClosed) && hasPick && !hasResult; // locked: show the saved pick
                      const missed = (remain <= 0 || gateClosed) && !hasPick && !hasResult; // closed with no pick
                      const showEditor = editable && (!hasPick || editingMatch === m.id);  // steppers visible
                      const showSaved = editable && hasPick && editingMatch !== m.id;       // saved view + Edit button
                      const earned = matchPoints(s, m);
                      const leadA = showEditor && (s.a ?? 0) > (s.b ?? 0);
                      const leadB = showEditor && (s.b ?? 0) > (s.a ?? 0);
                      return (
                        <Cine key={m.id}>
                        <div className="relative glass edge card-x rounded-3xl overflow-hidden"
                          style={{ borderColor: hasResult ? "rgba(242,193,78,.45)" : hasPick ? "rgba(23,178,106,.45)" : "var(--glassLine)" }}>
                          <div className="absolute pointer-events-none" style={{ [dir === "rtl" ? "left" : "right"]: -44, top: -22, opacity: .06 }}>
                            <Trophy size={250} glow={false} id={"wm-" + m.id} />
                          </div>
                          <div className="relative p-6">
                            <div className="flex flex-wrap items-center justify-center gap-2 mb-5 text-xs font-bold">
                              <span className="px-2.5 py-1 rounded-full" style={{ background: "rgba(23,178,106,.14)", color: "var(--mint)" }}>
                                {stageName(m.stage || "group", lang)}{m.group && m.group !== "—" ? ` · ${t.group} ${m.group}` : ""}
                              </span>
                              <span className="px-2.5 py-1 rounded-full glass num" style={{ color: "var(--dim)" }}>🕐 {localTimeStr(ko, lang)}</span>
                              {m.stadium && <span className="px-2.5 py-1 rounded-full glass" style={{ color: "var(--dim)" }}>🏟️ {m.stadium}{m.city ? ` · ${m.city}` : ""}</span>}
                              {editable && (
                                <span className="num px-2.5 py-1 rounded-full" dir="ltr" style={{ background: "rgba(242,193,78,.14)", color: "var(--goldText)", border: "1px solid rgba(242,193,78,.3)", animation: "pulseGold 2.4s ease-in-out infinite" }}>
                                  ⏳ {fmtRemain(remain)}
                                </span>
                              )}
                            </div>

                            <div className="flex items-center justify-between gap-3">
                              <div className="flex-1 text-center">
                                <span className={leadA ? "winner-ring inline-block" : "inline-block"}><Flag n={m.a} h={46} glow /></span>
                                <div className="font-extrabold text-base mt-2">{teamName(m.a, lang)}</div>
                                {leadA && <div className="text-xs font-extrabold mt-1" style={{ color: "var(--goldText)" }}>👑 {t.winnerHint}</div>}
                              </div>

                              <div className="text-center" style={{ minWidth: 150 }}>
                                {hasResult ? (
                                  <React.Fragment>
                                    <div className="display num text-4xl font-extrabold" dir="ltr">{scoreTxt(m.ra, m.rb)}</div>
                                    <div className="text-xs font-bold mt-1" style={{ color: "var(--goldText)" }}>{t.finalScore}</div>
                                  </React.Fragment>
                                ) : showEditor ? (
                                  <div className="flex items-center justify-center gap-3" dir={dir}>
                                    <Stepper value={s.a ?? 0} onChange={(v) => setScores((sc) => ({ ...sc, [m.id]: { ...sc[m.id], a: v } }))} />
                                    <span className="display font-extrabold text-xl" style={{ color: "var(--dimmer)" }}>:</span>
                                    <Stepper value={s.b ?? 0} onChange={(v) => setScores((sc) => ({ ...sc, [m.id]: { ...sc[m.id], b: v } }))} />
                                  </div>
                                ) : showSaved ? (
                                  <React.Fragment>
                                    <div className="display num text-4xl font-extrabold" dir="ltr" style={{ color: "var(--mint)" }}>{scoreTxt(s.a, s.b)}</div>
                                    <div className="text-xs font-bold mt-1" style={{ color: "var(--green2)" }}>{t.savedLabel}</div>
                                    {isKnockout && (s.a ?? 0) === (s.b ?? 0) && s.pw && <div className="text-xs font-bold mt-1 inline-flex items-center gap-1.5" style={{ color: "var(--goldText)" }}>🥅 <Flag n={s.pw === "a" ? m.a : m.b} h={13} /> {teamName(s.pw === "a" ? m.a : m.b, lang)}</div>}
                                  </React.Fragment>
                                ) : frozen ? (
                                  <React.Fragment>
                                    <div className="display num text-4xl font-extrabold" dir="ltr" style={{ color: "var(--mint)" }}>{scoreTxt(s.a, s.b)}</div>
                                    <div className="text-xs font-bold mt-1" style={{ color: "var(--green2)" }}>🔒 {t.locked}</div>
                                    {isKnockout && (s.a ?? 0) === (s.b ?? 0) && s.pw && <div className="text-xs font-bold mt-1 inline-flex items-center gap-1.5" style={{ color: "var(--goldText)" }}>🥅 <Flag n={s.pw === "a" ? m.a : m.b} h={13} /> {teamName(s.pw === "a" ? m.a : m.b, lang)}</div>}
                                  </React.Fragment>
                                ) : (
                                  <div className="display text-3xl font-extrabold" style={{ color: "var(--dimmer)" }}>vs</div>
                                )}
                              </div>

                              <div className="flex-1 text-center">
                                <span className={leadB ? "winner-ring inline-block" : "inline-block"}><Flag n={m.b} h={46} glow /></span>
                                <div className="font-extrabold text-base mt-2">{teamName(m.b, lang)}</div>
                                {leadB && <div className="text-xs font-extrabold mt-1" style={{ color: "var(--goldText)" }}>👑 {t.winnerHint}</div>}
                              </div>
                            </div>

                            <div className="mt-5">
                              {showEditor && isKnockout && (s.a ?? 0) === (s.b ?? 0) && (
                                <div className="mb-3 glass rounded-2xl p-3">
                                  <div className="text-xs font-bold mb-2 text-center" style={{ color: "var(--goldText)" }}>🥅 {t.penWho} <span style={{ color: "var(--dim)", fontWeight: 400 }}>· {t.penOptional}</span></div>
                                  <div className="flex gap-2 justify-center flex-wrap">
                                    {[["a", m.a], ["b", m.b]].map(([side, tn]) => (
                                      <button key={side} onClick={() => setScores((sc) => { const c = sc[m.id] || {}; return { ...sc, [m.id]: { ...c, a: c.a ?? 0, b: c.b ?? 0, pw: c.pw === side ? null : side } }; })}
                                        className="btn-pop px-3 py-1.5 rounded-full text-sm font-bold inline-flex items-center gap-1.5"
                                        style={s.pw === side
                                          ? { background: "var(--gold)", color: "#1c1503", boxShadow: "0 0 14px rgba(242,193,78,.5)" }
                                          : { background: "var(--s1)", color: "var(--text)", border: "1px solid var(--l1)" }}>
                                        <Flag n={tn} /> {teamName(tn, lang)}
                                      </button>
                                    ))}
                                  </div>
                                </div>
                              )}
                              {showEditor && (
                                <React.Fragment>
                                  <button onClick={async () => { await saveMatch(m.id); setEditingMatch(""); }}
                                    className="btn-pop sheen w-full py-3 rounded-2xl text-sm font-extrabold"
                                    style={{ background: "linear-gradient(120deg, var(--gold2), var(--goldDeep))", color: "#1c1503", boxShadow: "0 12px 30px -10px rgba(242,193,78,.55)" }}>
                                    {hasPick ? t.updatePick : t.saveLock} · <span className="num" dir="ltr">{scoreTxt(s.a ?? 0, s.b ?? 0)}</span>
                                  </button>
                                  <div className="text-center text-xs font-bold mt-2" style={{ color: "var(--dim)" }}>✏️ {t.editableHint}</div>
                                </React.Fragment>
                              )}
                              {showSaved && (
                                <React.Fragment>
                                  <button onClick={() => setEditingMatch(m.id)}
                                    className="btn-pop w-full py-2.5 rounded-2xl text-sm font-extrabold inline-flex items-center justify-center gap-2"
                                    style={{ background: "var(--s1)", color: "var(--text)", border: "1px solid rgba(242,193,78,.5)" }}>
                                    ✏️ {t.editPick}
                                  </button>
                                  <div className="text-center text-xs font-bold mt-2" style={{ color: "var(--dim)" }}>{t.editableHint}</div>
                                </React.Fragment>
                              )}
                              {missed && (
                                <div className="text-center text-xs font-bold py-2.5 rounded-2xl" style={{ background: "var(--s1)", color: "var(--dimmer)", border: "1px dashed var(--l1)" }}>
                                  {gateClosed && remain > 0 ? `🛑 ${t.voteStoppedMsg}` : `${t.closed} · ${t.started}`}
                                </div>
                              )}
                              {hasResult && hasPick && earned !== null && (
                                <div className="text-center text-xs font-bold">
                                  <span style={{ color: "var(--dim)" }}>{t.yourPick}: <span className="num" dir="ltr">{scoreTxt(s.a, s.b)}</span></span>
                                  <span className="px-3 py-1 rounded-full mx-2" style={{ background: earned === 5 ? "var(--gold)" : earned > 0 ? "rgba(23,178,106,.2)" : "var(--s2)", color: earned === 5 ? "#1c1503" : earned > 0 ? "var(--mint)" : "var(--dim)" }}>
                                    +{earned} {t.pts}
                                  </span>
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                        </Cine>
                      );

                            <td className="px-5 py-3">
                              {mp === null
                                ? <span className="text-xs font-bold" style={{ color: "var(--dimmer)" }}>{t.pending}</span>
                                : <span className="text-xs font-bold px-2.5 py-1 rounded-full" style={{ background: mp === 5 ? "#E8B931" : mp > 0 ? "rgba(23,178,106,.18)" : "var(--s2)", color: mp === 5 ? "#1c1503" : mp > 0 ? "var(--mint)" : "var(--dim)" }}>+{mp} · {mp === 5 ? t.exact : mp > 0 ? t.outcome : t.miss}</span>}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {dirty && (
                      <div className="px-5 py-4 flex items-center justify-end gap-3" style={{ borderTop: "1px solid var(--l1)" }}>
                        <button onClick={() => setEditScores((es) => { const n = { ...es }; delete n[userView]; return n; })} className="btn-pop text-xs font-bold px-4 py-2 rounded-lg" style={{ background: "var(--s2)", color: "var(--dim)" }}>✕</button>
                        <Btn kind="gold" onClick={() => saveUserPreds(userView)}>{t.saveChanges}</Btn>
                      </div>
                    )}
                    </React.Fragment>
                  )}
                </div>
              );
            })()}

            {/* --- APPEARANCE --- */}
            {adminSec === "look" && (
              <div className="max-w-2xl">
                <h3 className="display text-xl font-extrabold mb-1">🎨 {t.secLook}</h3>
                <p className="text-xs mb-4" style={{ color: "var(--dim)" }}>{t.lookNote}</p>

                <div className="glass rounded-2xl p-5 mb-4">
                  <div className="text-sm font-extrabold mb-3" style={{ color: "var(--goldText)" }}>{t.lookDefault}</div>
                  <div className="flex gap-2 mb-4">
                    {[["dark", `🌙 ${t.lookDark}`], ["light", `☀️ ${t.lookLight}`]].map(([k, label]) => (
                      <button key={k} onClick={() => saveLook({ ...look, def: k })}
                        className="btn-pop px-5 py-2.5 rounded-xl text-sm font-extrabold"
                        style={look.def === k
                          ? { background: "linear-gradient(120deg, var(--gold2), var(--goldDeep))", color: "#1c1503" }
                          : { background: "var(--s1)", color: "var(--text)", border: "1px solid var(--l1)" }}>
                        {label}
                      </button>
                    ))}
                  </div>
                  <button onClick={() => saveLook({ ...look, allowToggle: !look.allowToggle })}
                    className="btn-pop flex items-center gap-3 text-sm font-bold" style={{ color: "var(--text)" }}>
                    <span className="rounded-full relative" style={{ width: 42, height: 24, background: look.allowToggle ? "var(--green2)" : "var(--s2)", border: "1px solid var(--l2)", transition: "background .2s" }}>
                      <span className="absolute rounded-full" style={{ width: 18, height: 18, top: 2, [look.allowToggle ? "right" : "left"]: 3, background: "#fff", transition: "all .2s" }} />
                    </span>
                    {t.lookAllow}
                  </button>
                </div>

                <div className="glass rounded-2xl p-5">
                  <div className="text-sm font-extrabold mb-3" style={{ color: "var(--goldText)" }}>{t.lookPalette}</div>
                  <div className="grid grid-cols-2 gap-3">
                    {[
                      ["emerald", t.pEmerald, "linear-gradient(135deg,#07140D,#0E6B3D 60%,#F2C14E)"],
                      ["deep", t.pDeep, "linear-gradient(135deg,#010403,#03100a 65%,#17B26A)"],
                      ["warm", t.pWarm, "linear-gradient(135deg,#0A0903,#141008 55%,#F7C948)"],
                      ["royal", t.pRoyal, "linear-gradient(135deg,#020A0C,#06181C 55%,#14A696)"],
                    ].map(([k, label, grad]) => (
                      <button key={k} onClick={() => saveLook({ ...look, palette: k })}
                        className="btn-pop rounded-2xl p-3 flex items-center gap-3"
                        style={{ background: "var(--s1)", border: look.palette === k ? "2px solid var(--gold)" : "1px solid var(--l1)" }}>
                        <span className="rounded-xl shrink-0" style={{ width: 52, height: 36, background: grad, boxShadow: look.palette === k ? "0 0 14px rgba(242,193,78,.5)" : "none" }} />
                        <span className="text-sm font-bold" style={{ color: "var(--text)" }}>{label}</span>
                        {look.palette === k && <span style={{ color: "var(--goldText)" }}>✓</span>}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* --- FINAL --- */}
            {adminSec === "final" && (
              <div>
                <h3 className="display text-xl font-extrabold mb-1">{t.finalTitle}</h3>
                <p className="text-xs mb-4" style={{ color: C.dim }}>{t.finalNote}</p>
                <div className="glass rounded-2xl p-5 grid sm:grid-cols-2 gap-4 max-w-2xl">
                  {[["champion", t.champ], ["runnerUp", t.runner]].map(([f, label]) => (
                    <div key={f}>
                      <label className="text-xs font-bold" style={{ color: C.dim }}>{label}</label>
                      <select value={finalRes[f]} onChange={(e) => saveFinal({ ...finalRes, [f]: e.target.value })}
                        className="w-full mt-1 px-3 py-2.5 rounded-lg text-sm" style={{ ...inputDark, borderColor: finalRes[f] ? "rgba(232,185,49,.6)" : "var(--l2)" }}>
                        <option value="" style={{ color: "#111" }}>—</option>
                        {TEAMS.filter((tm) => tm.n !== "TBD").map((tm) => <option key={tm.n} value={tm.n} style={{ color: "#111" }}>{teamName(tm.n, lang)}</option>)}
                      </select>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </main>

      <footer className="mt-8" style={{ borderTop: "1px solid var(--s2)" }}>
        <FlagMarquee reverse h={24} />
        <div className="py-6 text-center text-xs" style={{ color: C.dimmer }}>
          <div className="flex justify-center mb-3"><Logo height={30} /></div>
          {t.footer}
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
<script>
(function(){
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var atmos = document.getElementById('wc-atmos'); if(!atmos) return;
  var GOLD='#d4af37', WHITE='#fff7e6', GREEN='#1f6f4a', RED='#e2484d';
  var rnd=function(a,b){return a+Math.random()*(b-a);};
  var cc=document.getElementById('wc-confetti'); var cols=[GOLD,WHITE,GREEN];
  if(cc && !reduce){ for(var i=0;i<16;i++){ var d=document.createElement('div'); d.className='wc-confetti';
    d.style.left=(Math.random()<.5?rnd(0,26):rnd(74,100))+'%'; d.style.background=cols[i%3];
    d.style.setProperty('--dx', rnd(-40,40)+'px'); d.style.animationDuration=rnd(11,20)+'s'; d.style.animationDelay=(-rnd(0,18))+'s';
    cc.appendChild(d); } }
  var du=document.getElementById('wc-dust');
  if(du && !reduce){ for(var j=0;j<16;j++){ var p=document.createElement('div'); p.className='wc-dust';
    p.style.left=(Math.random()<.5?rnd(2,24):rnd(76,98))+'%'; p.style.top=rnd(20,85)+'%';
    p.style.setProperty('--dx', rnd(-14,14)+'px'); p.style.animationDuration=rnd(7,14)+'s'; p.style.animationDelay=(-rnd(0,12))+'s';
    du.appendChild(p); } }
  var em=document.getElementById('wc-embers');
  if(em && !reduce){ for(var k=0;k<14;k++){ var e=document.createElement('div'); e.className='wc-ember';
    e.style.left=(Math.random()<.5?rnd(1,16):rnd(84,99))+'%';
    e.style.setProperty('--dx', rnd(-16,16)+'px'); e.style.animationDuration=rnd(5,10)+'s'; e.style.animationDelay=(-rnd(0,9))+'s';
    em.appendChild(e); } }
  var fw=document.getElementById('wc-fw'); var fwCols=[GOLD,WHITE,GOLD,RED];
  function boom(){ if(!fw) return; var b=document.createElement('div'); b.className='wc-fw boom';
    b.style.left=(Math.random()<.5?rnd(6,24):rnd(76,94))+'%'; b.style.top=rnd(8,34)+'%';
    b.style.color=fwCols[(Math.random()*fwCols.length)|0]; fw.appendChild(b);
    setTimeout(function(){ b.remove(); }, 1500); }
  if(fw && !reduce){ var loop=function(){ boom(); setTimeout(loop, rnd(10000,20000)); }; setTimeout(loop, 2500); }
  var par=document.getElementById('wc-par'), tx=0, ty=0, cx=0, cy=0, tk=false;
  if(par && !reduce && window.matchMedia('(pointer:fine)').matches){
    window.addEventListener('mousemove', function(e){
      tx=((e.clientX/window.innerWidth)-.5)*-16; ty=((e.clientY/window.innerHeight)-.5)*-10;
      if(!tk){ tk=true; requestAnimationFrame(function r(){ cx+=(tx-cx)*.08; cy+=(ty-cy)*.08;
        par.style.transform='translate3d('+cx.toFixed(2)+'px,'+cy.toFixed(2)+'px,0)';
        if(Math.abs(tx-cx)>.2||Math.abs(ty-cy)>.2){requestAnimationFrame(r);}else{tk=false;} }); }
    }, {passive:true});
  }
})();
</script>
</body>
</html>
